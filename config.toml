[endpoint]
url = "http://localhost:8080/v1/chat/completions"
model = "Echo"
temperature = 0.7
max_tokens = 2048

[summarizer]
enabled = true
url = "http://localhost:8082/v1/chat/completions"
model = "summarizer"

[embeddings]
url = "http://localhost:8080/v1/chat/completions"  # or same as main if using chat for embeddings
model = "Echo"  # or a dedicated embedding model

[web_search]
url = "https://api.tavily.com/search"
api_key = ""

[paths]
home_dir = ""
context_file = ""
database = "echo_tools.db"
memory_file = "memory.md"

[prompts]
main_system = "/home/eric/prompts/main_system.txt"
summarizer = "/home/eric/prompts/summarizer.txt"

[json_tools]
enabled = [
    "get_current_datetime",
    "web_search",
    "browse_page",
    "append_memory",
    "read_memory",
]

[context]
summarize_threshold = 180000
max_turns = 15 # max_turns = X   # Number of model-only turns allowed before triggering safety pause

[security]
denylist = [
    "rm -rf",
    "rm -r /",
    "$(echo rm) -rf /tmp",
    "> /dev/",
    "if=/dev/zero",
    "mkfs",
    "shred",
    "wipefs",
    "fdisk",
    "parted",
    "sudo rm",
    "rm --no-preserve-root",
    ":(){ :|:& };:",
    "fork bomb",
    "> /dev/sda",
    "chmod -R 777 /",
    "chown -R",
]
